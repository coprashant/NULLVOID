<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N U L L V O I D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #070710;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #00ffcc;
    }
    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.5em;
      margin-bottom: 16px;
      text-shadow: 0 0 16px #00ffcc, 0 0 40px #00ffcc55;
    }
    #canvas {
      display: block;
      border: 1px solid #00ffcc33;
      box-shadow: 0 0 40px #00ffcc1a, 0 0 80px #00ffcc0a;
    }
    .controls {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #ffffff44;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <h1>N U L L V O I D</h1>
  <canvas id="canvas" width="800" height="480"></canvas>
  <p class="controls">
    A / D &nbsp;·&nbsp; move &nbsp;|&nbsp;
    Shift + A / D &nbsp;·&nbsp; run &nbsp;|&nbsp;
    W or SPACE &nbsp;·&nbsp; jump &nbsp;|&nbsp;
    stomp aliens · collect diamonds
  </p>
  <script src="js/game.js"></script>
</body>
</html>
